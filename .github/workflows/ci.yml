name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install
      - name: Run migrations (test db)
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: "file:./test.db"
      - name: Typecheck
        run: npm run lint
      - name: Test
        run: npm test
        env:
          DATABASE_URL: "file:./test.db"
      - name: Build
        run: npm run build
